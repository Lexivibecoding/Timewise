            do {
              const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?' +
                `timeMin=${startDate.toISOString()}&` +
                `timeMax=${endDate.toISOString()}&` +
                `maxResults=2500&singleEvents=true` +
                (pageToken ? `&pageToken=${pageToken}` : '');

              console.log('[TimeWise] Fetching:', url);

              const response = await fetch(url, {
                headers: {
                  'Authorization': `Bearer ${googleAccessToken}`
                }
              });

              if (!response.ok) {

                console.error('[TimeWise] API error:', response.status, errText);

              pageToken = data.nextPageToken || null;
            } while (pageToken);

            // Filter out cancelled events
            allEvents = allEvents.filter(e => e.status !== 'cancelled');
            console.log('[TimeWise] After filtering cancelled:', allEvents.length, 'events');

            if (allEvents.length === 0) {
              setSyncStatus('connected');
              alert(`✅ No events found between ${startLabel} and ${endLabel}.\n\nNothing to delete.`);
              return;
            }

            // Deduplicate: for recurring instances use recurringEventId (parent),
            // for single events use their own id. This avoids trying to delete
            // synthetic instance IDs that the API rejects.
            const deleteIdSet = new Set();
            allEvents.forEach(event => {

      const Analytics = () => {
        const [useCustomRange, setUseCustomRange] = useState(false);
        const [customStartDate, setCustomStartDate] = useState('');
        const [customEndDate, setCustomEndDate] = useState('');

        const getDateRange = () => {
          if (useCustomRange) {
            if (customStartDate && customEndDate) {
              const startDate = new Date(customStartDate);
              const endDate = new Date(customEndDate);
              endDate.setHours(23, 59, 59, 999);
              return { startDate, endDate };
            } else {
              return null;
            }
          }

          // Sync with current calendar view
          let startDate = new Date(currentDate);
          let endDate = new Date(currentDate);

          switch(view) {
            case 'daily':
              startDate.setHours(0, 0, 0, 0);
              endDate.setHours(23, 59, 59, 999);
              break;
            case 'weekly':
              // Get Monday to Sunday of current week
              const dayOfWeek = startDate.getDay();
              const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek; // Monday
              startDate.setDate(startDate.getDate() + diff);
              startDate.setHours(0, 0, 0, 0);
              endDate = new Date(startDate);
              endDate.setDate(endDate.getDate() + 6); // Sunday
              endDate.setHours(23, 59, 59, 999);
              break;
            case 'monthly':
              startDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
              endDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
              endDate.setHours(23, 59, 59, 999);
              break;
            case 'yearly':
              startDate = new Date(currentDate.getFullYear(), 0, 1);
              endDate = new Date(currentDate.getFullYear(), 11, 31);
              endDate.setHours(23, 59, 59, 999);
              break;
          }

          return { startDate, endDate };
        };

        const calculateStats = (eventType) => {
          const range = getDateRange();
          if (!range) return { categoryStats: [], projectStats: [] };
          
          const { startDate, endDate } = range;

          // Category stats
          const categoryStats = categories.map(cat => {
            const categoryEvents = events.filter(e => 
              e.categoryId === cat.id && 
              e.type === eventType &&
              new Date(e.startDateTime) >= startDate &&
              new Date(e.startDateTime) <= endDate
            );

            const totalMinutes = categoryEvents.reduce((sum, event) => {
              const start = new Date(event.startDateTime);
              const end = new Date(event.endDateTime);
              return sum + (end - start) / (1000 * 60);
            }, 0);

            return {
              ...cat,
              hours: Math.round(totalMinutes / 60 * 10) / 10,
              percentage: 0
            };
          });

          const totalCategoryHours = categoryStats.reduce((sum, cat) => sum + cat.hours, 0);
          categoryStats.forEach(cat => {
            cat.percentage = totalCategoryHours > 0 ? Math.round((cat.hours / totalCategoryHours) * 100) : 0;
          });

          // Project stats (only for actual events)
          const projectStats = eventType === 'actual' ? yearlyProjects.map(project => {
            const projectEvents = events.filter(e => 
              e.projectId === project.id && 
              e.type === 'actual' &&
              new Date(e.startDateTime) >= startDate &&
              new Date(e.startDateTime) <= endDate
            );

            const totalMinutes = projectEvents.reduce((sum, event) => {
              const start = new Date(event.startDateTime);
              const end = new Date(event.endDateTime);
              return sum + (end - start) / (1000 * 60);
            }, 0);

            return {
              ...project,
              hours: Math.round(totalMinutes / 60 * 10) / 10,
              percentage: 0
            };
          }) : [];

          const totalProjectHours = projectStats.reduce((sum, proj) => sum + proj.hours, 0);
          projectStats.forEach(proj => {
            proj.percentage = totalProjectHours > 0 ? Math.round((proj.hours / totalProjectHours) * 100) : 0;
          });

          return { categoryStats, projectStats };
        };

        const plannedStats = calculateStats('planned');
        const actualStats = calculateStats('actual');
        const hasPlannedData = plannedStats.categoryStats.some(stat => stat.hours > 0);
        const hasActualData = actualStats.categoryStats.some(stat => stat.hours > 0);

        const getDateRangeLabel = () => {
          const range = getDateRange();
          if (!range) return 'Select dates';
          
          if (useCustomRange) {
            return `${customStartDate} to ${customEndDate}`;
          }

          const { startDate, endDate } = range;
          
          switch(view) {
            case 'daily':
              return currentDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            case 'weekly':
              return `${startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
            case 'monthly':
              return currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            case 'yearly':
              return currentDate.getFullYear().toString();
          }
        };

        return (
          <div className="analytics-panel">
            <div className="analytics-header" style={{ marginBottom: '20px' }}>
              <h2>Time Analytics</h2>
              <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' }}>
                <div style={{
                  padding: '8px 12px',
                  background: useCustomRange ? '#f5f7f5' : '#e8f5eb',
                  borderRadius: '6px',
                  fontSize: '13px',
                  fontWeight: 600,
                  color: '#2d5a3d',
                  border: useCustomRange ? '1px solid #d4e8d9' : '2px solid #4a7c59',
                  display: 'flex',
                  alignItems: 'center',
                  gap: '6px'
                }}>
                  📅 {getDateRangeLabel()}
                </div>
                <button
                  onClick={() => setUseCustomRange(!useCustomRange)}
                  style={{
                    padding: '6px 12px',
                    background: 'white',
                    border: '1px solid #d4e8d9',
                    borderRadius: '6px',
                    fontSize: '12px',
                    color: '#4a7c59',
                    cursor: 'pointer',
                    transition: 'all 0.2s'
                  }}
                  onMouseEnter={e => e.target.style.background = '#f5f7f5'}
                  onMouseLeave={e => e.target.style.background = 'white'}
                >
                  {useCustomRange ? '🔙 Use Calendar View' : '📆 Custom Range'}
                </button>
              </div>
            </div>

            {useCustomRange && (
              <div style={{ 
                marginBottom: '20px',
                padding: '16px',
                background: '#f5f7f5',
                borderRadius: '8px',
                display: 'flex',
                gap: '12px',
                alignItems: 'center',
                flexWrap: 'wrap'
              }}>
                <label style={{ fontSize: '13px', color: '#2d5a3d', fontWeight: 600 }}>
                  Date Range:
                </label>
                <input 
                  type="date" 
                  value={customStartDate}
                  onChange={e => setCustomStartDate(e.target.value)}
                  style={{ padding: '6px 10px', borderRadius: '6px', border: '1px solid #d4e8d9' }}
                />
                <span style={{ color: '#6b9b7a' }}>to</span>
                <input 
                  type="date" 
                  value={customEndDate}
                  onChange={e => setCustomEndDate(e.target.value)}
                  style={{ padding: '6px 10px', borderRadius: '6px', border: '1px solid #d4e8d9' }}
                />
              </div>
            )}

            {!hasPlannedData && !hasActualData && (
              <p style={{ color: '#6b9b7a', textAlign: 'center', padding: '20px' }}>
                No events recorded for this time period. Create some events to see analytics!
              </p>
            )}

            {(hasPlannedData || hasActualData) && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '24px' }}>
                {/* Planned Section */}
                <div>
                  <div style={{
                    padding: '12px',
                    background: 'linear-gradient(135deg, #e8f5eb 0%, #d4e8d9 100%)',
                    borderRadius: '8px',
                    marginBottom: '16px',
                    border: '2px dashed #4a7c59',
                    textAlign: 'center'
                  }}>
                    <span style={{ fontSize: '14px', fontWeight: 600, color: '#2d5a3d' }}>
                      📋 Planned Time
                    </span>
                  </div>

                  {!hasPlannedData && (
                    <p style={{ color: '#6b9b7a', textAlign: 'center', padding: '20px', fontSize: '13px' }}>
                      No planned events in this period
                    </p>
                  )}

                  {hasPlannedData && (
                    <>
                      <h4 style={{ fontSize: '13px', color: '#2d5a3d', marginBottom: '12px', fontWeight: 600 }}>
                        By Category
                      </h4>
                      <div className="category-stats">
                        {plannedStats.categoryStats.filter(s => s.hours > 0).map(stat => (
                          <div key={stat.id} className="stat-item">
                            <div className="stat-header">
                              <div className="stat-color" style={{ 
                                backgroundColor: stat.color,
                                borderStyle: 'dashed',
                                borderWidth: '2px'
                              }}></div>
                              <span className="stat-name">{stat.name}</span>
                              <span className="stat-hours">{stat.hours}h</span>
                            </div>
                            <div className="stat-bar">
                              <div 
                                className="stat-fill" 
                                style={{ 
                                  width: `${stat.percentage}%`,
                                  background: `linear-gradient(135deg, ${stat.color}30 0%, ${stat.color}50 100%)`
                                }}
                              ></div>
                            </div>
                            <div className="stat-percentage">{stat.percentage}%</div>
                          </div>
                        ))}
                      </div>
                    </>
                  )}
                </div>

                {/* Actual Section */}
                <div>
                  <div style={{
                    padding: '12px',
                    background: 'linear-gradient(135deg, #f0f9f4 0%, #e0f0e8 100%)',
                    borderRadius: '8px',
                    marginBottom: '16px',
                    border: '2px solid #6b9b7a',
                    textAlign: 'center'
                  }}>
                    <span style={{ fontSize: '14px', fontWeight: 600, color: '#4a7c59' }}>
                      ✅ Actual Time
                    </span>
                  </div>

                  {!hasActualData && (
                    <p style={{ color: '#6b9b7a', textAlign: 'center', padding: '20px', fontSize: '13px' }}>
                      No actual events in this period
                    </p>
                  )}

                  {hasActualData && (
                    <>
                      <h4 style={{ fontSize: '13px', color: '#2d5a3d', marginBottom: '12px', fontWeight: 600 }}>
                        By Category
                      </h4>
                      <div className="category-stats">
                        {actualStats.categoryStats.filter(s => s.hours > 0).map(stat => (
                          <div key={stat.id} className="stat-item">
                            <div className="stat-header">
                              <div className="stat-color" style={{ backgroundColor: stat.color }}></div>
                              <span className="stat-name">{stat.name}</span>
                              <span className="stat-hours">{stat.hours}h</span>
                            </div>
                            <div className="stat-bar">
                              <div 
                                className="stat-fill" 
                                style={{ 
                                  width: `${stat.percentage}%`,
                                  background: `linear-gradient(135deg, ${stat.color}B0 0%, ${stat.color}D0 100%)`
                                }}
                              ></div>
                            </div>
                            <div className="stat-percentage">{stat.percentage}%</div>

        const daysInMonth = lastDay.getDate();

        const days = [];

        }
        for (let i = 1; i <= daysInMonth; i++) {
          days.push(i);
        }

          if (!day) return [];
          const date = new Date(year, month, day);
          return events.filter(e => {
            const eventDate = new Date(e.startDateTime);

                   eventDate.getMonth() === month &&
                   eventDate.getFullYear() === year;

      const ProjectTimelineView = () => {
        const today = new Date();
        const currentYear = today.getFullYear();
        const [hoveredProject, setHoveredProject] = useState(null);
        
        // Calculate year start and end for timeline
        const yearStart = new Date(currentYear, 0, 1);
        const yearEnd = new Date(currentYear, 11, 31);
        const yearDays = Math.ceil((yearEnd - yearStart) / (1000 * 60 * 60 * 24));
        
        // Generate month markers for timeline
        const monthMarkers = Array.from({ length: 12 }, (_, i) => {
          const date = new Date(currentYear, i, 1);
          const dayOfYear = Math.ceil((date - yearStart) / (1000 * 60 * 60 * 24));
          const monthName = date.toLocaleDateString('en-US', { month: 'short' });
          return { dayOfYear, monthName };
        });
        
        const calculateProgress = (projectId) => {
          const project = yearlyProjects.find(p => p.id === projectId);
          if (!project) return null;
          
          // Calculate year-to-date actual hours
          const yearToDate = new Date(currentYear, 0, 1);
          const actualEvents = events.filter(e => 
            e.type === 'actual' &&
            e.projectId === projectId &&
            new Date(e.startDateTime) >= yearToDate &&
            new Date(e.startDateTime) <= today
          );
          
          const actualHours = actualEvents.reduce((sum, e) => {
            const duration = (new Date(e.endDateTime) - new Date(e.startDateTime)) / (1000 * 60 * 60);
            return sum + duration;
          }, 0);
          
          const plannedHours = project.plannedHours || 100;
          const percentage = Math.min(100, Math.round((actualHours / plannedHours) * 100));
          
          return {
            actualHours: Math.round(actualHours * 10) / 10,
            plannedHours,
            percentage,
            remaining: Math.max(0, plannedHours - actualHours)
          };
        };
        
        return (

          const project = yearlyProjects.find(p => p.id === projectId);
          if (!project) return null;

          // Calculate YTD (Year To Date) actual hours
          const yearStart = new Date(year, 0, 1);
          const now = new Date();
          
          const actualEvents = events.filter(e => 
            e.projectId === projectId && 
            e.type === 'actual' &&
            new Date(e.startDateTime) >= yearStart &&
            new Date(e.startDateTime) <= now
          );

          const actualMinutes = actualEvents.reduce((sum, event) => {
            const start = new Date(event.startDateTime);
            const end = new Date(event.endDateTime);
            return sum + (end - start) / (1000 * 60);
          }, 0);

          const actualHours = Math.round(actualMinutes / 60 * 10) / 10;
          const plannedHours = project.plannedHours || 0;
          const percentage = plannedHours > 0 ? Math.round((actualHours / plannedHours) * 100) : 0;

            ...project,
            actualHours,
            plannedHours,
            percentage
          };
        };

        const renderMiniMonth = (monthIndex) => {
          const firstDay = new Date(year, monthIndex, 1);
          const lastDay = new Date(year, monthIndex + 1, 0);
          const startingDayOfWeek = firstDay.getDay();
          const daysInMonth = lastDay.getDate();

          const days = [];
          for (let i = 0; i < startingDayOfWeek; i++) {
            days.push(null);
          }
          for (let i = 1; i <= daysInMonth; i++) {

            newDate.setDate(newDate.getDate() + (direction * 7));
            break;
          case 'monthly':
            newDate.setMonth(newDate.getMonth() + direction);
            break;
          case 'yearly':
            newDate.setFullYear(newDate.getFullYear() + direction);
            break;

        setCurrentDate(newDate);
      };

            <div className="loading-text">Loading...</div>
          </div>
        );

      if (dataLoading) {

          <div className="loading-container">
            <div className="loading-spinner"></div>
            <div className="loading-text">Loading your data...</div>
          </div>

      }

      return (
        <div>

            {yearlyProjects.length === 0 && (

                <span>No yearly projects. Click settings to add up to 3 projects →</span>
              </div>
            )}
            {yearlyProjects.map(project => {
              const daysLeft = getDaysUntil(project.deadline);
              return (
                <div key={project.id} className="countdown-item">

                  <span>{daysLeft} Days until {project.name} DDL</span>

              <span>Sign Out</span>
            </button>

                onMouseLeave={e => e.target.style.color = '#2d5a3d'}
                title="Back to Weekly View"
              >

              </h1>
              <div style={{ display: 'flex', alignItems: 'center', gap: '24px', marginTop: '12px' }}>
                <div className="view-switcher">
                  <button 
                    className={view === 'timeline' ? 'active' : ''}
                    onClick={() => setView('timeline')}
                  >
                    Timeline
                  </button>
                  <button 
                    className={view === 'daily' ? 'active' : ''}
                    onClick={() => setView('daily')}
                  >
                    Day
                  </button>
                  <button 
                    className={view === 'weekly' ? 'active' : ''}
                    onClick={() => setView('weekly')}
                  >
                    Week
                  </button>
                  <button 
                    className={view === 'monthly' ? 'active' : ''}
                    onClick={() => setView('monthly')}
                  >
                    Month
                  </button>
                  <button 
                    className={view === 'yearly' ? 'active' : ''}
                    onClick={() => setView('yearly')}
                  >
                    Year
                  </button>
                </div>
                <p style={{ 
                  fontSize: '17px', 
                  color: '#2d5a3d', 
                  fontWeight: '700',
                  fontStyle: 'italic',
                  margin: 0
                }}>
                  I choose to grow with time, like a tree
                </p>
              </div>
            </div>

            <div className="header-right">
              {/* Tracking Streak */}
              {(() => {
                const streak = getTrackingStreak();
                return streak > 0 ? (
                  <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: '8px',
                    padding: '6px 12px',

                  }}>
                    <span style={{ fontSize: '16px' }}>🔥</span>
                    <span style={{ fontSize: '14px', fontWeight: '600', color: '#e65100' }}>

                  </div>
                ) : null;
              })()}
              
              <button 
                className="btn-icon" 
                onClick={() => setShowExportModal(true)}

              >
                📋
              </button>
              <button

                onClick={() => setShowSyncModal(true)} 
                title="Google Calendar Sync"
                style={{ position: 'relative' }}
              >
                🔗
                {googleConnected && (
                  <span style={{ 
                    position: 'absolute', 
                    top: '6px', 
                    right: '6px', 
                    width: '8px', 
                    height: '8px', 
                    background: '#4caf50', 
                    borderRadius: '50%',
                    border: '2px solid white'
                  }}></span>
                )}
              </button>
              <button 
                className="btn-icon" 
                onClick={() => {

              >
                📅
              </button>
              <button 
                className="btn-icon" 
                onClick={() => setShowAnalytics(true)} 
                title="Analytics"
              >
                📊
              </button>
              <button className="btn-icon" onClick={() => setShowCategoryModal(true)} title="Manage Categories">

              </button>
              <button className="btn-primary" onClick={() => setShowEventModal(true)}>

              <button onClick={() => navigateCalendar(-1)}>
                <ChevronLeft />
              </button>
            )}
            <h2>
              {view === 'timeline' && `Project Timeline ${currentDate.getFullYear()}`}
              {view === 'yearly' && currentDate.getFullYear()}
              {view === 'monthly' && currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
              {view === 'weekly' && `Week of ${currentDate.toLocaleDateString()}`}
              {view === 'daily' && currentDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}
            </h2>
            {view !== 'timeline' && (
              <>
                <button onClick={() => navigateCalendar(1)}>
                  <ChevronRight />
                </button>
                <button className="btn-today" onClick={() => setCurrentDate(new Date())}>Today</button>
              </>
            )}
            
            {view === 'daily' && (
              <div className="daily-toggle">
                <button

                  onClick={() => setDailyViewMode('calendar')}
                >
                  <Grid /> Calendar
                </button>
                <button 
                  className={dailyViewMode === 'todolist' ? 'active' : ''}
                  onClick={() => setDailyViewMode('todolist')}

                  <List /> Todo List
                </button>

            {!showAnalytics && view === 'monthly' && <MonthlyView />}
            
            {!showAnalytics && view === 'weekly' && <WeeklyView />}
            
            {!showAnalytics && view === 'daily' && dailyViewMode === 'calendar' && <DailyView />}
            
            {!showAnalytics && view === 'daily' && dailyViewMode === 'todolist' && <DailyTodoListView />}
            
            {!showAnalytics && view === 'yearly' && <YearView />}

          {showCategoryModal && <CategoryModal />}
          {showProjectModal && <ProjectModal />}

          {showCompletionModal && <CompletionModal />}
          {showExportModal && <ExportModal />}
          {showGoogleSetupModal && <GoogleSetupModal />}
          {showJournalModal && <JournalModal />}
          {showWeeklyReflectionModal && <WeeklyReflectionModal />}

          {isSelectMode && selectedEventIds.length > 0 && (
            <div className="floating-action-bar">
              <span style={{ fontSize: '14px', fontWeight: '600' }}>
                {selectedEventIds.length} event{selectedEventIds.length > 1 ? 's' : ''} selected
              </span>
              <button onClick={() => setSelectedEventIds([])}>
                Clear
              </button>
              <button
                className="danger"
                onClick={() => {
                  // Check if selected events have recurring siblings
                  const selectedEvents = events.filter(e => selectedEventIds.includes(e.id));
                  const selectedIdSet = new Set(selectedEventIds);

                  // Find recurring siblings not in selection
                  let additionalRecurring = [];
                  selectedEvents.forEach(evt => {
                    const recurring = findRecurringEvents(evt);
                    recurring.forEach(r => {
                      if (!selectedIdSet.has(r.id) && !additionalRecurring.find(a => a.id === r.id)) {
                        additionalRecurring.push(r);
                      }
                    });
                  });

                  if (additionalRecurring.length > 0) {
                    setRecurringDeleteContext({
                      selectedIds: [...selectedEventIds],
                      additionalRecurring,
                      source: 'batch'
                    });
                    setShowRecurringDeleteModal(true);
                  } else {
                    if (confirm(`Delete ${selectedEventIds.length} selected event${selectedEventIds.length > 1 ? 's' : ''}? This cannot be undone.`)) {
                      deleteEventsFromGoogle(events.filter(e => selectedIdSet.has(e.id)));
                      setEvents(events.filter(e => !selectedIdSet.has(e.id)));
                      deleteEventsFromFirestore([...selectedIdSet]);
                      setSelectedEventIds([]);
                      setIsSelectMode(false);
                      setViewRefreshKey(prev => prev + 1);
                    }
                  }
                }}
              >
                🗑 Delete Selected
              </button>
            </div>
          )}

          {/* Recurring Delete Modal */}
          {showRecurringDeleteModal && recurringDeleteContext && (
            <div className="modal-overlay" onClick={() => setShowRecurringDeleteModal(false)}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: '520px' }}>

                    <p style={{ fontSize: '14px', color: '#4a7c59', marginBottom: '12px' }}>

                    <div style={{
                      background: '#f5f7f5',
                      borderRadius: '8px',
                      padding: '12px',
                      maxHeight: '200px',
                      overflowY: 'auto',
                      marginBottom: '12px'
                    }}>
                      {[events.find(e => e.id === recurringDeleteContext.eventId), ...recurringDeleteContext.additionalRecurring]
                        .filter(Boolean)
                        .sort((a, b) => new Date(a.startDateTime) - new Date(b.startDateTime))
                        .map(evt => (
                          <div key={evt.id} style={{
                            padding: '6px 8px',
                            borderBottom: '1px solid #e0e7e0',
                            fontSize: '13px',
                            display: 'flex',
                            justifyContent: 'space-between'
                          }}>
                            <span style={{ fontWeight: evt.id === recurringDeleteContext.eventId ? '700' : '400' }}>
                              {evt.title} {evt.id === recurringDeleteContext.eventId && '(this one)'}
                            </span>
                            <span style={{ color: '#6b9b7a' }}>
                              {new Date(evt.startDateTime).toLocaleDateString()}
                            </span>
                          </div>
                        ))
                      }
                    </div>
                  </div>
                )}

                {recurringDeleteContext.source === 'batch' && (
                  <div style={{ marginBottom: '16px' }}>
                    <p style={{ fontSize: '14px', color: '#4a7c59', marginBottom: '12px' }}>
                      Your selection includes events that have <strong>{recurringDeleteContext.additionalRecurring.length}</strong> additional recurring siblings not in your selection.
                    </p>
                    <div style={{
                      background: '#f5f7f5',
                      borderRadius: '8px',
                      padding: '12px',
                      maxHeight: '200px',
                      overflowY: 'auto',
                      marginBottom: '12px'
                    }}>
                      <div style={{ fontSize: '12px', color: '#6b9b7a', marginBottom: '8px', fontWeight: '600' }}>
                        Additional recurring events:
                      </div>
                      {recurringDeleteContext.additionalRecurring
                        .sort((a, b) => new Date(a.startDateTime) - new Date(b.startDateTime))
                        .map(evt => (
                          <div key={evt.id} style={{
                            padding: '6px 8px',
                            borderBottom: '1px solid #e0e7e0',
                            fontSize: '13px',
                            display: 'flex',
                            justifyContent: 'space-between'
                          }}>
                            <span>{evt.title}</span>
                            <span style={{ color: '#6b9b7a' }}>
                              {new Date(evt.startDateTime).toLocaleDateString()}
                            </span>
                          </div>
                        ))
                      }
                    </div>
                  </div>
                )}

                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                  <button
                    className="btn-primary"
                    onClick={() => {
                      // Delete only selected / single
                      const idsToDelete = recurringDeleteContext.source === 'single'
                        ? new Set([recurringDeleteContext.eventId])
                        : new Set(recurringDeleteContext.selectedIds);
                      deleteEventsFromGoogle(events.filter(e => idsToDelete.has(e.id)));
                      setEvents(events.filter(e => !idsToDelete.has(e.id)));
                      deleteEventsFromFirestore([...idsToDelete]);
                      setSelectedEventIds([]);
                      setIsSelectMode(false);
                      setShowRecurringDeleteModal(false);
                      setRecurringDeleteContext(null);
                      setViewRefreshKey(prev => prev + 1);
                      if (recurringDeleteContext.source === 'single') {
                        setShowEventModal(false);
                        setPrefilledEventData(null);
                        window.__editingEventId = null;
                      }
                    }}
                    style={{ width: '100%', justifyContent: 'center' }}
                  >
                    {recurringDeleteContext.source === 'single'
                      ? 'Delete this one only'
                      : `Delete ${recurringDeleteContext.selectedIds.length} selected only`
                    }
                  </button>
                  <button
                    className="btn-secondary"
                    onClick={() => {
                      const idsToDelete = recurringDeleteContext.source === 'single'
                        ? new Set([
                            recurringDeleteContext.eventId,
                            ...recurringDeleteContext.additionalRecurring.map(e => e.id)
                          ])
                        : new Set([
                            ...recurringDeleteContext.selectedIds,
                            ...recurringDeleteContext.additionalRecurring.map(e => e.id)
                          ]);
                      deleteEventsFromGoogle(events.filter(e => idsToDelete.has(e.id)));
                      setEvents(events.filter(e => !idsToDelete.has(e.id)));
                      deleteEventsFromFirestore([...idsToDelete]);
                      setSelectedEventIds([]);
                      setIsSelectMode(false);
                      setShowRecurringDeleteModal(false);
                      setRecurringDeleteContext(null);
                      setViewRefreshKey(prev => prev + 1);
                      if (recurringDeleteContext.source === 'single') {
                        setShowEventModal(false);
                        setPrefilledEventData(null);
                        window.__editingEventId = null;
                      }
                    }}
                    style={{
                      width: '100%',
                      justifyContent: 'center',
                      background: '#f44336',
                      color: 'white',
                      borderColor: '#f44336'
                    }}
                  >
                    {recurringDeleteContext.source === 'single'
                      ? `Delete all ${recurringDeleteContext.additionalRecurring.length + 1} recurring events`
                      : `Delete all ${recurringDeleteContext.selectedIds.length + recurringDeleteContext.additionalRecurring.length} (including recurring)`
                    }
                  </button>
                  <button
                    className="btn-secondary"
                    onClick={() => {
                      setShowRecurringDeleteModal(false);
                      setRecurringDeleteContext(null);
                    }}
                    style={{ width: '100%', justifyContent: 'center' }}
                  >
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
